version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ams_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ams_user
      POSTGRES_PASSWORD: ams_password
      POSTGRES_DB: ams_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ams_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
